---
- name: prepare AquaSKK config dir
  file: path='~/Library/Application Support/AquaSKK' state=directory

- name: symlink keymap for AquaSKK
  file: >-
    src={{ dotfiles_dir }}/.config/AquaSKK/keymap.conf
    dest='~/Library/Application Support/AquaSKK/keymap.conf'
    state=link
    force=yes

- name: symlink kana-rule for AquaSKK
  file: >-
    src={{ dotfiles_dir }}/.config/AquaSKK/kana-rule.conf
    dest='~/Library/Application Support/AquaSKK/kana-rule.conf'
    state=link
    force=yes

- git: >-
    repo=https://{{ item }}
    dest=~/git/{{ item }}
  with_items:
    - github.com/KeenS/SKK_JISYO.wiktionary
    - github.com/uasi/skk-emoji-jisyo
    - github.com/ymrl/SKK-JISYO.emoji-ja
    - github.com/skk-dev/dict

- homebrew: >-
    name=skktools
    state=latest

- name: generate dictionary for shikakugoma
  vars:
    dest_file: ~/Library/Application Support/AquaSKK/SKK_JISYO.shikakugoma
  shell: |
    before=$(shasum "{{ dest_file }}" 2>/dev/null || echo "")
    skkdic-expr SKK_JISYO.shikakugoma | skkdic-sort > "{{ dest_file }}"
    after=$(shasum "{{ dest_file }}")
    [ "$before" != "$after" ] && echo "CHANGED" || echo "OK"
  args:
    executable: /bin/bash
    chdir: ~/git/github.com/KeenS/SKK_JISYO.wiktionary
  register: shikakugoma_result
  changed_when: "'CHANGED' in shikakugoma_result.stdout"

- name: copy emoji dictionary
  copy: >-
    src=~/git/github.com/uasi/skk-emoji-jisyo/SKK-JISYO.emoji.utf8
    dest='~/Library/Application Support/AquaSKK/SKK-JISYO.emoji.utf8'
    force=yes

- name: copy emoji-ja dictionary
  copy: >-
    src=~/git/github.com/ymrl/SKK-JISYO.emoji-ja/SKK-JISYO.emoji-ja.utf8
    dest='~/Library/Application Support/AquaSKK/SKK-JISYO.emoji-ja.utf8'
    force=yes

- name: download jawiki dictionary from latest release
  vars:
    dest_file: ~/Library/Application Support/AquaSKK/SKK-JISYO.jawiki
  shell: |
    before=$(shasum "{{ dest_file }}" 2>/dev/null || echo "")
    gh release download --repo tokuhirom/jawiki-kana-kanji-dict --pattern 'SKK-JISYO.jawiki' --clobber --dir '~/Library/Application Support/AquaSKK'
    after=$(shasum "{{ dest_file }}")
    [ "$before" != "$after" ] && echo "CHANGED" || echo "OK"
  args:
    executable: /bin/bash
  register: jawiki_result
  changed_when: "'CHANGED' in jawiki_result.stdout"

- name: convert some dictionaries
  shell: |
    dest=~/Library/Application\ Support/AquaSKK/{{ item }}.utf8
    before=$(shasum "$dest" 2>/dev/null || echo "")
    iconv -f EUC-JISX0213 -t UTF-8 ~/git/github.com/skk-dev/dict/{{ item }} > "$dest"
    after=$(shasum "$dest")
    [ "$before" != "$after" ] && echo "CHANGED" || echo "OK"
  args:
    executable: /bin/bash
  register: convert_result
  changed_when: "'CHANGED' in convert_result.stdout"
  with_items:
    - SKK-JISYO.fullname
    - SKK-JISYO.JIS3_4
    - SKK-JISYO.JIS2004
    - SKK-JISYO.itaiji.JIS3_4
